<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Melos — Create Room</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  width:100vw; height:100vh;
  background:#2E1F2E;
  overflow:hidden; cursor:none;
  font-family:Georgia,serif;
}

canvas { position:fixed; inset:0; width:100%; height:100%; }

#cursor-dot {
  position:fixed; width:6px; height:6px;
  background:#FDFEF5; border-radius:50%;
  pointer-events:none; transform:translate(-50%,-50%);
  z-index:20; opacity:0; transition:opacity 0.3s;
}

#center {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; z-index:5;
}

.page-label {
  font-size:11px; letter-spacing:5px;
  color:rgba(203,170,203,0.45);
  text-transform:uppercase;
}

#create-btn {
  width:110px; height:110px;
  border-radius:28px;
  background:rgba(203,170,203,0.08);
  border:1px solid rgba(203,170,203,0.28);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  cursor:pointer;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:6px;
  transition:background 0.25s, border-color 0.25s, transform 0.2s;
}
#create-btn:hover {
  background:rgba(203,170,203,0.18);
  border-color:rgba(203,170,203,0.5);
  transform:scale(1.04);
}
#create-btn svg { width:32px; height:32px; }
#create-btn span {
  font-size:10px; letter-spacing:2px;
  color:rgba(253,254,245,0.6);
}

#modal-overlay {
  position:fixed; inset:0;
  background:rgba(30,16,30,0.6);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:10;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity 0.3s;
}
#modal-overlay.open { opacity:1; pointer-events:all; }

.modal {
  width:460px; max-width:94vw;
  background:rgba(48,32,52,0.75);
  border:1px solid rgba(203,170,203,0.18);
  border-radius:24px;
  backdrop-filter:blur(36px);
  -webkit-backdrop-filter:blur(36px);
  padding:36px 36px 28px;
  display:flex; flex-direction:column;
  transform:translateY(16px) scale(0.97);
  transition:transform 0.3s;
}
#modal-overlay.open .modal { transform:translateY(0) scale(1); }

.modal-header {
  display:flex; align-items:center;
  justify-content:space-between; margin-bottom:28px;
}
.modal-title {
  font-size:18px; font-weight:400;
  color:#FDFEF5; letter-spacing:1px;
}
.modal-close {
  width:28px; height:28px; border-radius:50%;
  background:rgba(203,170,203,0.08);
  border:1px solid rgba(203,170,203,0.18);
  color:rgba(203,170,203,0.55); cursor:pointer;
  font-size:13px; display:flex;
  align-items:center; justify-content:center;
  transition:background 0.2s;
}
.modal-close:hover { background:rgba(203,170,203,0.2); }

.field { margin-bottom:20px; }
.field label {
  display:block; font-size:10px;
  color:rgba(203,170,203,0.5);
  letter-spacing:3px; margin-bottom:8px;
}
.field input, .field textarea {
  width:100%; padding:11px 14px;
  border-radius:12px;
  background:rgba(253,254,245,0.04);
  border:1px solid rgba(203,170,203,0.13);
  color:#FDFEF5; font-family:Georgia,serif;
  font-size:13px; outline:none; resize:none;
  transition:border-color 0.2s, background 0.2s;
}
.field input::placeholder,
.field textarea::placeholder { color:rgba(203,170,203,0.22); }
.field input:focus, .field textarea:focus {
  border-color:rgba(203,170,203,0.48);
  background:rgba(253,254,245,0.07);
}
.field textarea { height:68px; line-height:1.6; }

.theme-label {
  font-size:10px; color:rgba(203,170,203,0.5);
  letter-spacing:3px; margin-bottom:12px;
}
.themes-grid {
  display:grid; grid-template-columns:repeat(5,1fr);
  gap:8px; margin-bottom:12px;
}
.theme-swatch {
  aspect-ratio:1; border-radius:10px; cursor:pointer;
  border:2px solid transparent;
  transition:transform 0.18s, border-color 0.18s;
  position:relative; overflow:hidden;
}
.theme-swatch:hover { transform:scale(1.08); }
.theme-swatch.selected { border-color:#FDFEF5; transform:scale(1.08); }
.theme-swatch .check {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity 0.15s;
}
.theme-swatch.selected .check { opacity:1; }

.custom-row {
  display:flex; align-items:center;
  gap:12px; margin-bottom:22px;
}
.custom-label {
  font-size:10px; color:rgba(203,170,203,0.4);
  letter-spacing:2px; flex:1;
}
.color-picker-wrap {
  position:relative; width:44px; height:44px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
  padding: 3px;
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.color-picker-wrap:hover {
  transform: scale(1.15) rotate(15deg);
  box-shadow: 0 0 25px rgba(255,255,255,0.4);
}
.color-picker-wrap input[type=color] {
  position:absolute; inset:0;
  width:100%; height:100%;
  opacity:0; cursor:pointer; border:none; padding:0;
}
.color-preview {
  width:100%; height:100%; border-radius:50%;
  border:2px solid #222;
  pointer-events:none;
}
.custom-apply {
  padding:7px 16px; border-radius:99px;
  background:rgba(203,170,203,0.1);
  border:1px solid rgba(203,170,203,0.25);
  color:rgba(253,254,245,0.75);
  font-family:Georgia,serif; font-size:11px;
  letter-spacing:2px; cursor:pointer;
  transition:background 0.2s;
}
.custom-apply:hover { background:rgba(203,170,203,0.2); }

.theme-tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(16,9,3,0.9);
  color: #FDFEF5;
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 11px;
  letter-spacing: 2px;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 1000;
  top: 0; left: 0;
  transform: translate(0, 0);
  border: 1px solid rgba(200,168,122,0.2);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.theme-tooltip.visible {
  opacity: 1;
}

.preview-strip {
  height:5px; border-radius:3px;
  margin-bottom:22px; transition:background 0.4s;
}

.submit-btn {
  width:100%; padding:13px 0; border-radius:999px;
  background:rgba(203,170,203,0.15);
  border:1px solid rgba(203,170,203,0.35);
  color:#FDFEF5; font-family:Georgia,serif;
  font-size:12px; letter-spacing:4px; cursor:pointer;
  transition:background 0.2s, border-color 0.2s;
}
.submit-btn:hover {
  background:rgba(203,170,203,0.28);
  border-color:rgba(203,170,203,0.58);
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="cursor-dot"></div>

<div id="center">
  <p class="page-label">your rooms</p>
  <button id="create-btn">
    <svg viewBox="0 0 32 32" fill="none" stroke="#CBAACB" stroke-width="1.8" stroke-linecap="round">
      <line x1="16" y1="7" x2="16" y2="25"/>
      <line x1="7" y1="16" x2="25" y2="16"/>
    </svg>
    <span>create a room</span>
  </button>
</div>

<div id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">create a room</span>
      <button class="modal-close" id="close-btn">✕</button>
    </div>

    <div class="field">
      <label>room name</label>
      <input type="text" id="room-name-input" placeholder="give your room a name…" maxlength="40"/>
    </div>

    <p class="theme-label">choose a theme</p>
    <div class="themes-grid" id="themes-grid"></div>

    <div class="custom-row">
      <span class="custom-label">or pick your own colour</span>
      <div class="color-picker-wrap">
        <div class="color-preview" id="color-preview"></div>
        <input type="color" id="color-picker" value="#9F87AF"/>
      </div>
      <button class="custom-apply" id="apply-custom">apply</button>
    </div>

    <div class="preview-strip" id="preview-strip"></div>
    <button class="submit-btn" id="submit-create-room">create room</button>
  </div>
</div>

<div class="theme-tooltip" id="theme-tooltip"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const dot    = document.getElementById('cursor-dot');

let W, H, mouse = {x:-999, y:-999}, animId, time = 0;
const rings = [], grainLines = [], orbs = [];

function buildRings() {
  rings.length = 0;
  const cx = W * 0.5, cy = H * 0.5;
  for (let i = 0; i < 18; i++) {
    rings.push({
      cx: cx + (Math.random() - 0.5) * W * 0.5,
      cy: cy + (Math.random() - 0.5) * H * 0.5,
      baseR:  40 + Math.random() * 180,
      speed:  0.0003 + Math.random() * 0.0005,
      phase:  Math.random() * Math.PI * 2,
      opacity: 0.04 + Math.random() * 0.07,
      thickness: 0.5 + Math.random() * 1.2,
      color: ['#CBAACB','#6B3F3F','#454859','#9F87AF','#7A6890'][Math.floor(Math.random()*5)]
    });
  }
}

function buildGrain() {
  grainLines.length = 0;
  for (let i = 0; i < 28; i++) {
    grainLines.push({
      offset:    Math.random() * (W + H),
      thickness: 0.4 + Math.random() * 1.4,
      opacity:   0.03 + Math.random() * 0.07,
      speed:     (Math.random() - 0.5) * 0.12,
      color:     ['#CBAACB','#FDFEF5','#6B3F3F'][Math.floor(Math.random()*3)],
      hoverAmt:  0,
    });
  }
}

function buildOrbs() {
  orbs.length = 0;
  const colors = ['#CBAACB','#6B3F3F','#454859','#88527F','#2A1A2A'];
  for (let i = 0; i < 6; i++) {
    orbs.push({
      x: Math.random() * W, y: Math.random() * H,
      r:  60 + Math.random() * 120,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.18,
      color:   colors[i % colors.length],
      opacity: 0.06 + Math.random() * 0.1,
      _displayOpacity: 0,
    });
  }
}

function hexToRgb(hex) {
    if(!hex) return [0,0,0];
    let c = hex.substring(1).split('');
    if(c.length == 3){ c= [c[0], c[0], c[1], c[1], c[2], c[2]]; }
    c= '0x'+c.join('');
    return [(c>>16)&255, (c>>8)&255, c&255];
}
function rgbToHex(r,g,b) {
    return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase().padStart(6,'0');
}
function lighten(hex, percent) {
    let rgb = hexToRgb(hex);
    let r = Math.min(255, Math.floor(rgb[0] + (255 - rgb[0]) * percent));
    let g = Math.min(255, Math.floor(rgb[1] + (255 - rgb[1]) * percent));
    let b = Math.min(255, Math.floor(rgb[2] + (255 - rgb[2]) * percent));
    return rgbToHex(r,g,b);
}

function updateBackgroundColors() {
    let activeBgHex = customColor ? customColor : (selectedTheme.base || selectedTheme.a);
    const stop0 = activeBgHex;
    const stop35 = lighten(activeBgHex, 0.05);
    const stop65 = lighten(activeBgHex, 0.02);
    const stop100 = lighten(activeBgHex, 0.08);
    window.bgGradient = { stop0, stop35, stop65, stop100 };
    
    const palette = [stop0, stop35, stop65, stop100, lighten(activeBgHex, 0.15), lighten(activeBgHex, 0.25)];
    rings.forEach(r => r.color = palette[Math.floor(Math.random() * palette.length)]);
    orbs.forEach(o => o.color = palette[Math.floor(Math.random() * palette.length)]);
    grainLines.forEach(g => g.color = palette[Math.floor(Math.random() * palette.length)]);
}

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildRings(); buildGrain(); buildOrbs();
  updateBackgroundColors();
}

function nearMouse(x, y, r) {
  const dx = x - mouse.x, dy = y - mouse.y;
  return Math.sqrt(dx*dx + dy*dy) < r;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  if(window.bgGradient) {
      const bg = ctx.createLinearGradient(0, 0, W, H);
      bg.addColorStop(0, window.bgGradient.stop0);
      bg.addColorStop(0.35, window.bgGradient.stop35);
      bg.addColorStop(0.65, window.bgGradient.stop65);
      bg.addColorStop(1, window.bgGradient.stop100);
      ctx.fillStyle = bg;
  } else {
      ctx.fillStyle = '#2E1F2E';
  }
  ctx.fillRect(0, 0, W, H);

  orbs.forEach(o => {
    const near = nearMouse(o.x, o.y, 160);
    const target = near ? Math.min(o.opacity * 2.5, 0.28) : o.opacity;
    o._displayOpacity += (target - o._displayOpacity) * 0.05;
    const alpha = Math.round(o._displayOpacity * 255).toString(16).padStart(2,'0');
    const grad = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
    grad.addColorStop(0, o.color + alpha);
    grad.addColorStop(1, o.color + '00');
    ctx.beginPath();
    ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
    ctx.fillStyle = grad; ctx.fill();
    o.x += o.vx; o.y += o.vy;
    if (o.x < -o.r) o.x = W + o.r;
    if (o.x > W + o.r) o.x = -o.r;
    if (o.y < -o.r) o.y = H + o.r;
    if (o.y > H + o.r) o.y = -o.r;
  });

  rings.forEach(ring => {
    const pulse = Math.sin(time * ring.speed * 1000 + ring.phase) * 12;
    const r = ring.baseR + pulse;
    const near = nearMouse(ring.cx, ring.cy, r + 40);
    
    ring._hov = ring._hov || 0;
    ring._hov += ((near ? 1 : 0) - ring._hov) * 0.1;

    ctx.beginPath();
    ctx.arc(ring.cx, ring.cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = ring.color;
    ctx.lineWidth = ring.thickness;
    ctx.globalAlpha = ring.opacity;
    ctx.stroke();

    if (ring._hov > 0.01) {
        ctx.save();
        const hgrad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 200);
        hgrad.addColorStop(0, `rgba(255, 255, 255, ${ring._hov * 0.65})`);
        hgrad.addColorStop(1, `rgba(255, 255, 255, 0)`);
        ctx.strokeStyle = hgrad;
        ctx.lineWidth = ring.thickness * (1 + ring._hov * 2.5);
        ctx.globalAlpha = 1;
        ctx.beginPath(); ctx.arc(ring.cx, ring.cy, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
    }
    
    ctx.globalAlpha = 1;
  });

  grainLines.forEach(g => {
    g.offset += g.speed;
    if (g.offset > W + H + 500) g.offset -= (W + H + 1000);
    if (g.offset < -(W + H + 500)) g.offset += (W + H + 1000);
    
    const sx = g.offset + 200, sy = -200, ex = g.offset - H - 200, ey = H + 200;
    const dx = ex - sx, dy = ey - sy;
    const len = Math.sqrt(dx*dx + dy*dy);
    const t = Math.max(0, Math.min(1, ((mouse.x-sx)*dx + (mouse.y-sy)*dy) / (len*len)));
    const dist = Math.sqrt((mouse.x-(sx+t*dx))**2 + (mouse.y-(sy+t*dy))**2);
    const hover = Math.max(0, 1 - dist / 85);
    g.hoverAmt += (hover - g.hoverAmt) * 0.1;
    
    ctx.beginPath();
    ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
    ctx.lineWidth = g.thickness;
    ctx.strokeStyle = g.color;
    ctx.globalAlpha = g.opacity;
    ctx.stroke();
    
    if (g.hoverAmt > 0.01) {
        ctx.save();
        const px = sx + t * dx;
        const py = sy + t * dy;
        const hgrad = ctx.createRadialGradient(px, py, 0, px, py, 180);
        hgrad.addColorStop(0, `rgba(255, 255, 255, ${g.hoverAmt * 0.85})`);
        hgrad.addColorStop(1, `rgba(255, 255, 255, 0)`);
        ctx.strokeStyle = hgrad;
        ctx.lineWidth = g.thickness * (1 + g.hoverAmt * 3);
        ctx.globalAlpha = 1;
        ctx.stroke();
        ctx.restore();
    }
    
    ctx.globalAlpha = 1;
  });

  time += 0.016;
  animId = requestAnimationFrame(draw);
}

const THEMES = [
  { name:'Dark Brown', a:'#130C05', b:'#1A0E06', c:'#2C1A0A', base: '#130C05' },
  { name:'Midnight', a:'#0F3460', b:'#16213E', c:'#1A1A2E' },
  { name:'Forest',   a:'#1B2A1F', b:'#4CAF7D', c:'#2D5016' },
  { name:'Ember',    a:'#2C1810', b:'#E8824A', c:'#8B3A1E' },
  { name:'Ocean',    a:'#0D1B2A', b:'#1A3A5C', c:'#5BA4CF' },
  { name:'Rose',     a:'#2A1520', b:'#D4789E', c:'#8B2252' },
  { name:'Slate',    a:'#1C1F2E', b:'#2D3561', c:'#8892B0' },
  { name:'Amber',    a:'#1E1800', b:'#6B4C00', c:'#F0B429' },
  { name:'Dusk',     a:'#1A1025', b:'#4A148C', c:'#B388FF' },
  { name:'Sage',     a:'#141E17', b:'#2E4A3E', c:'#80CBC4' },
];

let selectedTheme = THEMES[0], customColor = null;
const grid  = document.getElementById('themes-grid');
const strip = document.getElementById('preview-strip');

function makeGradient(t) {
  return `linear-gradient(135deg,${t.a} 0%,${t.b} 50%,${t.c} 100%)`;
}
function updateStrip() {
  strip.style.background = customColor ? customColor : makeGradient(selectedTheme);
  updateBackgroundColors();
}

THEMES.forEach((t, i) => {
  const sw = document.createElement('div');
  sw.className = 'theme-swatch' + (i === 0 ? ' selected' : '');
  sw.style.background = makeGradient(t);
  sw.innerHTML = `<span class="check"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 5.5,10.5 12,3" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`;
  sw.addEventListener('click', () => {
    document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('selected'));
    sw.classList.add('selected');
    selectedTheme = t; customColor = null; updateStrip();
  });
  sw.addEventListener('mousemove', e => {
    const rect = sw.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width / 2;
    const y = e.clientY - rect.top - rect.height / 2;
    sw.style.transform = `translate(${x * 0.4}px, ${y * 0.4}px) scale(1.15)`;
    sw.style.zIndex = 10;
    
    const tooltip = document.getElementById('theme-tooltip');
    tooltip.textContent = t.name;
    tooltip.classList.add('visible');
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY - 35) + 'px';
  });
  sw.addEventListener('mouseleave', () => {
    sw.style.transform = '';
    sw.style.zIndex = 1;
    document.getElementById('theme-tooltip').classList.remove('visible');
  });
  grid.appendChild(sw);
});
updateStrip();

const picker  = document.getElementById('color-picker');
const preview = document.getElementById('color-preview');
preview.style.background = picker.value;
picker.addEventListener('input', () => { preview.style.background = picker.value; });
document.getElementById('apply-custom').addEventListener('click', () => {
  customColor = picker.value;
  document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('selected'));
  updateStrip();
});

document.getElementById('create-btn').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.add('open');
});
document.getElementById('close-btn').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
});

document.getElementById('submit-create-room').addEventListener('click', () => {
  const roomName = document.getElementById('room-name-input').value.trim();
  const chosenColor = customColor ? customColor : (selectedTheme.base || selectedTheme.a);
  if (roomName) {
    window.location.href = `room.html?room=${encodeURIComponent(roomName)}&color=${encodeURIComponent(chosenColor)}`;
  } else {
    const input = document.getElementById('room-name-input');
    input.style.borderColor = 'rgba(255, 100, 100, 0.8)';
    setTimeout(() => {
      input.style.borderColor = 'rgba(203,170,203,0.13)';
    }, 1500);
  }
});

document.addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY;
  dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
  dot.style.opacity = '1';
});
document.addEventListener('mouseleave', () => {
  mouse.x = -999; mouse.y = -999; dot.style.opacity = '0';
});
window.addEventListener('resize', () => { cancelAnimationFrame(animId); resize(); });

resize(); draw();
</script>
</body>
</html>
